# KokoPixel V2 Configuration

# Server Configuration
server-id: ""  # Auto-generated if empty

# BungeeCord / Velocity Mode
bungee:
  enabled: false

# Proxy type: "bungeecord" or "velocity"
# When using Velocity, ensure bungee-plugin-message-channel is enabled in velocity.toml
proxy:
  type: "bungeecord"

# Lobby Settings
lobby:
  world: "world"

# Game Selector Blocks (auto-generated)
selector-blocks: {}

# Minigame Settings
minigames:
  default-min-players: 2
  default-max-players: 16
  worlds:
    delete-on-end: true
    default-environment: NORMAL

# Game Selector Item
game-selector:
  enabled: true
  material: COMPASS
  name: "§a§lGame Selector &7(Right Click)"
  slot: 0
  lore:
    - "§7Right-click to open"
    - "§7the game selector menu"